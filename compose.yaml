services:
  db:
    image: postgres:17-bookworm
    container_name: seshat-db
    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "8051:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
